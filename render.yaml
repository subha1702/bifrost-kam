services:
  - type: web
    name: bifrost-kam
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bifrost-kam-db
          property: connectionString
      - key: PUSH_TOKEN
        value: myntra-kam-2026

databases:
  - name: bifrost-kam-db
    plan: free
